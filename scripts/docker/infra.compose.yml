services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mifolyo_forum
      POSTGRES_USER: mifolyo
      POSTGRES_PASSWORD: mifolyo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mifolyo -d mifolyo_forum"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - mifolyo_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - mifolyo_redis_data:/data

volumes:
  mifolyo_postgres_data:
  mifolyo_redis_data:
